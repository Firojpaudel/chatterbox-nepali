<!DOCTYPE html>
<html lang="ne">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatterbox • Nepali TTS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
:root {
    /* Colors - Inspired by ClickHouse */
    --canvas: #0a0a0a;
    --primary: #faff69;
    --primary-active: #e6eb52;
    --primary-disabled: #3a3a1f;
    --surface-card: #1a1a1a;
    --surface-elevated: #242424;
    --hairline: #2a2a2a;
    --hairline-strong: #3a3a3a;
    
    --text-main: #ffffff;
    --text-body: #cccccc;
    --text-muted: #888888;
    --text-on-primary: #0a0a0a;
    
    --success: #22c55e;
    --danger: #ef4444;
    --info: #3b82f6;

    /* Spacing */
    --spacing-section: 96px;
    --spacing-xl: 32px;
    --spacing-lg: 24px;
    --spacing-md: 16px;

    /* Border Radius */
    --rounded-md: 8px;
    --rounded-lg: 12px;
    --rounded-pill: 9999px;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

/* Custom Scrollbar */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}
::-webkit-scrollbar-track {
    background: var(--canvas);
}
::-webkit-scrollbar-thumb {
    background: var(--hairline-strong);
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: var(--text-muted);
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--canvas);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.55;
    padding: var(--spacing-xl) 1rem;
}

.app-container {
    max-width: 1100px;
    width: 100%;
}

header {
    text-align: left;
    margin-bottom: var(--spacing-xl);
    border-bottom: 1px solid var(--hairline);
    padding-bottom: var(--spacing-md);
}

h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    letter-spacing: -2px;
    color: var(--text-main);
    margin-bottom: 0.5rem;
    text-transform: uppercase;
}

.subtitle {
    color: var(--text-muted);
    font-size: 1.1rem;
    font-weight: 400;
    letter-spacing: -0.3px;
}

.main-content {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: var(--spacing-xl);
    align-items: start;
}

@media (max-width: 900px) {
    .main-content {
        grid-template-columns: 1fr;
    }
}

.editor-card {
    background: var(--surface-card);
    border: 1px solid var(--hairline);
    border-radius: var(--rounded-lg);
    padding: var(--spacing-xl);
}

.textarea-wrapper {
    background: #000;
    border: 1px solid var(--hairline-strong);
    border-radius: var(--rounded-md);
    margin-bottom: var(--spacing-md);
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
}

.textarea-wrapper:hover {
    border-color: var(--text-muted);
}

.textarea-wrapper:focus-within {
    border-color: var(--primary);
    box-shadow: 0 0 0 1px var(--primary);
}

textarea {
    width: 100%;
    min-height: 380px; /* Larger input field */
    background: transparent;
    border: none;
    padding: var(--spacing-lg);
    color: var(--text-main);
    font-size: 1.2rem;
    font-family: 'JetBrains Mono', monospace;
    resize: vertical;
    outline: none;
    line-height: 1.7;
}

.editor-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--spacing-lg);
}

.char-count {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.sample-phrases {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
}

.phrase-tag {
    padding: 6px 12px;
    background: var(--surface-elevated);
    border: 1px solid var(--hairline);
    border-radius: var(--rounded-pill);
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.phrase-tag:hover {
    color: var(--primary);
    border-color: var(--primary);
    background: #000;
}

.btn-group {
    display: flex;
    gap: 1rem;
    margin-bottom: var(--spacing-lg);
}

button {
    padding: 14px 28px;
    border-radius: var(--rounded-md);
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    border: none;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.btn-primary {
    background: var(--primary);
    color: var(--text-on-primary);
}

.btn-primary:hover {
    background: var(--primary-active);
    transform: translateY(-1px);
}

.btn-primary:active {
    transform: translateY(0);
}

.btn-secondary {
    background: var(--surface-elevated);
    color: var(--text-main);
    border: 1px solid var(--hairline);
}

.btn-secondary:hover {
    background: var(--hairline-strong);
    color: var(--primary);
}

button:disabled {
    opacity: 0.2;
    cursor: not-allowed;
    transform: none !important;
}

/* Sidebar Stats & Visuals */
.sidebar {
    display: flex;
    flex-direction: column;
    gap: var(--spacing-lg);
}

.stats-card {
    background: var(--surface-card);
    border: 1px solid var(--hairline);
    border-radius: var(--rounded-lg);
    padding: var(--spacing-lg);
}

.stat-item {
    margin-bottom: var(--spacing-lg);
}

.stat-item:last-child {
    margin-bottom: 0;
}

.stat-label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-muted);
    font-weight: 700;
    margin-bottom: 4px;
}

.stat-value {
    font-size: 56px; /* Even larger stat display */
    font-weight: 700;
    color: var(--primary);
    line-height: 1;
    letter-spacing: -2px;
}

.visualizer-container {
    width: 100%;
    height: 180px;
    background: #000;
    border: 1px solid var(--hairline);
    border-radius: var(--rounded-lg);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

canvas {
    width: 100%;
    height: 100%;
    display: block;
}

.status-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding-top: var(--spacing-md);
    border-top: 1px solid var(--hairline);
}

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--hairline-strong);
}

.status-dot.active {
    background: var(--success);
    box-shadow: 0 0 12px var(--success);
}

.status-dot.error {
    background: var(--danger);
    box-shadow: 0 0 12px var(--danger);
}
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Chatterbox</h1>
            <p class="subtitle">ULTRA-LOW LATENCY NEPALI TTS ENGINE</p>
        </header>

        <main class="main-content">
            <section class="editor-card">
                <div class="textarea-wrapper">
                    <textarea id="textInput" spellcheck="false" placeholder="Type or paste Nepali text here...">नमस्ते! म च्याटरबक्स नेपाली टीटीएस हुँ। म निकै छिटो र प्रस्ट बोल्न सक्छु।</textarea>
                </div>
                
                <div class="editor-footer">
                    <div class="sample-phrases">
                        <span class="phrase-tag" data-text="नेपाल दक्षिण एसियामा अवस्थित एक भूपरिवेष्टित देश हो।">Intro</span>
                        <span class="phrase-tag" data-text="आजको मौसम निकै राम्रो छ, बाहिर घुम्न जान सकिन्छ।">Weather</span>
                        <span class="phrase-tag" data-text="च्याटरबक्स एउटा अत्याधुनिक नेपाली टेक्स्ट-टु-स्पीच प्रविधि हो।">Tech</span>
                    </div>
                    <div class="char-count" id="charCount">0 characters</div>
                </div>

                <div class="btn-group">
                    <button id="speakBtn" class="btn-primary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        Deploy Stream
                    </button>
                    <button id="stopBtn" class="btn-secondary">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
                        Abort
                    </button>
                </div>

                <div class="status-bar">
                    <div id="statusDot" class="status-dot"></div>
                    <span id="statusLabel">System Ready</span>
                </div>
            </section>

            <aside class="sidebar">
                <div class="stats-card">
                    <div class="stat-item">
                        <span class="stat-label">TTFB</span>
                        <div id="ttfbValue" class="stat-value">0ms</div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Chunk Latency</span>
                        <div id="deltaValue" class="stat-value">0ms</div>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">Jitter</span>
                        <div id="jitterValue" class="stat-value">0ms</div>
                    </div>
                </div>

                <div class="visualizer-container">
                    <canvas id="visualizer"></canvas>
                </div>
            </aside>
        </main>
    </div>

    <script>
        const textInput = document.getElementById('textInput');
        const charCount = document.getElementById('charCount');
        const speakBtn = document.getElementById('speakBtn');
        const stopBtn = document.getElementById('stopBtn');
        const ttfbValue = document.getElementById('ttfbValue');
        const deltaValue = document.getElementById('deltaValue');
        const jitterValue = document.getElementById('jitterValue');
        const statusLabel = document.getElementById('statusLabel');
        const statusDot = document.getElementById('statusDot');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        let audioCtx;
        let ws;
        let nextStartTime = 0;
        let lastChunkArrival = 0;
        let deltas = [];
        let analyser;
        let dataArray;

        function updateCharCount() {
            charCount.innerText = `${textInput.value.length} characters`;
        }
        textInput.addEventListener('input', updateCharCount);
        updateCharCount();

        function setupVisualizer() {
            if (!analyser) {
                analyser = audioCtx.createAnalyser();
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
            }
        }

        function draw() {
            requestAnimationFrame(draw);
            const width = canvas.width;
            const height = canvas.height;

            if (!analyser) {
                ctx.clearRect(0, 0, width, height);
                ctx.beginPath();
                ctx.moveTo(0, height / 2);
                ctx.lineTo(width, height / 2);
                ctx.strokeStyle = '#2a2a2a';
                ctx.lineWidth = 1;
                ctx.stroke();
                return;
            }

            analyser.getByteTimeDomainData(dataArray);

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            ctx.lineWidth = 2;
            ctx.strokeStyle = '#faff69';
            ctx.beginPath();

            const sliceWidth = width / dataArray.length;
            let x = 0;

            for (let i = 0; i < dataArray.length; i++) {
                const v = dataArray[i] / 128.0;
                const y = (v * height) / 2;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
                x += sliceWidth;
            }
            ctx.lineTo(width, height / 2);
            ctx.stroke();
        }

        function updateStatus(label, type = 'idle') {
            statusLabel.innerText = label;
            statusDot.className = 'status-dot' + (type === 'active' ? ' active' : (type === 'error' ? ' error' : ''));
        }

        speakBtn.onclick = async () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
                setupVisualizer();
            }
            if (audioCtx.state === 'suspended') await audioCtx.resume();

            const text = textInput.value.trim();
            if (!text) return;

            speakBtn.disabled = true;
            updateStatus('Connecting to stream...', 'active');
            
            ttfbValue.innerText = '0ms';
            deltaValue.innerText = '0ms';
            jitterValue.innerText = '0ms';
            deltas = [];
            
            nextStartTime = audioCtx.currentTime + 0.1;
            lastChunkArrival = Date.now();

            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            ws.binaryType = 'arraybuffer';

            ws.onmessage = async (event) => {
                if (typeof event.data === 'string') {
                    const msg = JSON.parse(event.data);
                    if (msg.status === 'starting') {
                        updateStatus('Synthesis in progress', 'active');
                    } else if (msg.status === 'streaming') {
                        if (msg.ttfb) ttfbValue.innerText = Math.round(msg.ttfb) + 'ms';
                        
                        const now = Date.now();
                        const arrivalDelta = now - lastChunkArrival;
                        lastChunkArrival = now;
                        
                        if (arrivalDelta > 1) {
                            deltas.push(arrivalDelta);
                            deltaValue.innerText = Math.round(arrivalDelta) + 'ms';
                            if (deltas.length > 1) {
                                const avg = deltas.reduce((a, b) => a + b) / deltas.length;
                                const jitter = deltas.slice(-10).reduce((acc, val) => acc + Math.abs(val - avg), 0) / Math.min(deltas.length, 10);
                                jitterValue.innerText = Math.round(jitter) + 'ms';
                                deltaValue.style.color = arrivalDelta > 150 ? 'var(--danger)' : 'var(--primary)';
                            }
                        }
                    } else if (msg.status === 'complete') {
                        updateStatus('Stream completed');
                        speakBtn.disabled = false;
                    } else if (msg.status === 'error') {
                        updateStatus('Stream error: ' + msg.message, 'error');
                        speakBtn.disabled = false;
                    }
                } else {
                    const audioData = new Float32Array(event.data);
                    const buffer = audioCtx.createBuffer(1, audioData.length, 24000);
                    buffer.getChannelData(0).set(audioData);
                    const source = audioCtx.createBufferSource();
                    source.buffer = buffer;
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);
                    const startTime = Math.max(nextStartTime, audioCtx.currentTime);
                    source.start(startTime);
                    nextStartTime = startTime + buffer.duration;
                }
            };

            ws.onclose = () => {
                speakBtn.disabled = false;
                if (statusLabel.innerText.includes('Synthesis')) updateStatus('System Ready');
            };

            ws.onopen = () => ws.send(JSON.stringify({ text: text, language: 'ne' }));
        };

        document.querySelectorAll('.phrase-tag').forEach(tag => {
            tag.onclick = () => {
                textInput.value = tag.getAttribute('data-text');
                updateCharCount();
                textInput.focus();
            };
        });

        stopBtn.onclick = () => {
            if (ws) ws.close();
            if (audioCtx) { audioCtx.close(); audioCtx = null; analyser = null; }
            speakBtn.disabled = false;
            updateStatus('Stream Aborted');
        };

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            canvas.width = canvas.offsetWidth * dpr;
            canvas.height = canvas.offsetHeight * dpr;
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
